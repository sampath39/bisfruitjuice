<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular Glow Background -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="60%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <linearGradient id="juiceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="strawGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" />

  <!-- Straw (behind glass) -->
  <rect x="260" y="40" width="30" height="240" rx="15" transform="rotate(-25, 275, 160)" fill="url(#strawGrad)" />
  <!-- Straw stripes -->
  <path d="M 285,60 L 305,69 M 275,90 L 295,99 M 265,120 L 285,129 M 255,150 L 275,159" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

  <!-- Glass Cup Body -->
  <path d="M 160,180 L 190,440 C 192,455 205,470 220,470 L 292,470 C 307,470 320,455 322,440 L 352,180 Z" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" />
  
  <!-- Juice Inside Glass -->
  <path d="M 172,270 L 190,440 C 192,448 200,458 210,458 L 302,458 C 312,458 320,448 322,440 L 340,270 C 290,290 220,250 172,270 Z" fill="url(#juiceGrad)" />

  <!-- Floating Orange Slice on Rim -->
  <circle cx="160" cy="180" r="55" fill="#f97316" stroke="#ffffff" stroke-width="8" />
  <circle cx="160" cy="180" r="42" fill="#fb923c" />
  <!-- Orange Segments -->
  <path d="M 160,180 L 160,142 A 38,38 0 0,1 192,160 Z" fill="#ffffff" fill-opacity="0.9" />
  <path d="M 160,180 L 192,198 A 38,38 0 0,1 160,218 Z" fill="#ffffff" fill-opacity="0.9" />
  <path d="M 160,180 L 128,198 A 38,38 0 0,1 128,162 Z" fill="#ffffff" fill-opacity="0.9" />
  <circle cx="160" cy="180" r="10" fill="#ffffff" />

  <!-- Mint Leaves near rim -->
  <path d="M 330,170 C 350,150 370,170 350,190 C 330,210 320,180 330,170 Z" fill="#22c55e" />
  <path d="M 345,175 C 360,160 375,175 360,190" stroke="#16a34a" stroke-width="3" fill="none" />

  <!-- Bubbles inside Juice -->
  <circle cx="210" cy="330" r="10" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="280" cy="360" r="14" fill="#ffffff" fill-opacity="0.4" />
  <circle cx="240" cy="400" r="8" fill="#ffffff" fill-opacity="0.6" />
  <circle cx="300" cy="300" r="12" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="200" cy="420" r="12" fill="#ffffff" fill-opacity="0.4" />

  <!-- Highlight Reflection on Glass -->
  <path d="M 335,210 L 315,410" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" fill-opacity="0.25" opacity="0.4" />
</svg>